name: Validate Soul Protocol

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e . pytest

      - name: Run tests
        run: python -m pytest

      - name: Validate nodes
        run: python tools/validate_nodes.py

      - name: Check registry
        run: python tools/check_registry.py

      - name: Check Soul Protocol standard
        run: python tools/check_glyph_standard.py

      - name: Compile public L1 index
        run: python tools/doctrine_l1_index.py compile --apply

      - name: Doctor public L1 index
        run: python tools/doctrine_l1_index.py doctor --write

      - name: Verify public L1 doctor receipt green
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          receipt = json.loads(Path('public-evidence/PUBLIC_DOCTRINE_L1_DOCTOR.json').read_text())
          if not receipt.get('ok'):
              raise SystemExit(f"Public L1 doctor not green: failures={receipt.get('failure_count')}")
          print(json.dumps({
              'ok': receipt.get('ok'),
              'compiled_count': receipt.get('compiled_count'),
              'ok_count': receipt.get('ok_count'),
              'failure_count': receipt.get('failure_count')
          }, indent=2))
          PY
